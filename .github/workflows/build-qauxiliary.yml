name: Build QAuxiliary APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build APK Artifacts
    runs-on: ubuntu-24.04
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CCACHE_BASEDIR: "${{ github.workspace }}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "true"
          fetch-depth: 0

      - name: Configure submodules
        shell: bash
        run: |
          set -euo pipefail
          git -C "libs/LSPlant" config "submodule.test/src/main/jni/external/lsprism.update" none
          git -C "libs/LSPlant" config "submodule.test/src/main/jni/external/lsparself.update" none
          git -C "libs/LSPlant" config "submodule.docs/doxygen-awesome-css.update" none
          git -C "libs/mmkv/MMKV" config "submodule.Python/pybind11.update" none
          git submodule foreach git submodule update --init --recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Install ninja-build and ccache
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ninja-build ccache
          ccache -o max_size=1G
          ccache -o hash_dir=false
          ccache -o hard_link=true
          ccache -o compiler_check='%compiler% -dumpmachine; %compiler% -dumpversion'
          ccache -zp

      - name: Accept Android SDK licenses and install CMake
        shell: bash
        run: |
          set -euo pipefail

          echo "ANDROID_HOME=${ANDROID_HOME}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"

          mkdir -p "$ANDROID_HOME/licenses"
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\n" > "$ANDROID_HOME/licenses/android-sdk-license"

          set +o pipefail
          yes 2>/dev/null | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          set -o pipefail

          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "cmake;3.31.0"

          {
            echo "sdk.dir=${ANDROID_HOME}"
            echo "qauxv.override.ninja.path=/usr/bin/ninja"
          } > local.properties

          cat local.properties

      - name: Prepare temporary signing key
        shell: bash
        run: |
          set -euo pipefail

          rm -f keystore.jks

          keytool -genkeypair \
            -v \
            -keystore keystore.jks \
            -storepass qauxvci123456 \
            -keypass qauxvci123456 \
            -alias qauxv_ci \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=QAuxiliary CI,O=Personal,C=CN"

          echo "KEYSTORE_PATH=../keystore.jks" >> "$GITHUB_ENV"
          echo "KEYSTORE_PASSWORD=qauxvci123456" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=qauxv_ci" >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=qauxvci123456" >> "$GITHUB_ENV"

          keytool -list \
            -keystore keystore.jks \
            -storepass qauxvci123456 \
            -alias qauxv_ci

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        shell: bash
        run: |
          set -euo pipefail
          echo "org.gradle.parallel=true" >> gradle.properties
          echo "org.gradle.vfs.watch=true" >> gradle.properties
          sed -i 's/org.gradle.configuration-cache=true//g' gradle.properties || true
          ./gradlew :app:synthesizeDistReleaseApksCI :app:extractReleaseNativeDebugMetadata --no-daemon
          ccache -s
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
          QAUXV_OVERRIDE_CMAKE_VERSION: "3.31.0"

      - name: Collect APK artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build-artifacts
          cp app/build/outputs/ci/*.apk build-artifacts/
          if ! compgen -G "build-artifacts/*.apk" > /dev/null; then
            echo "No APK files found under app/build/outputs/ci/"
            exit 1
          fi
          (
            cd build-artifacts
            sha256sum *.apk > SHA256SUMS.txt
          )

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: QAuxiliary-custom-apks
          path: build-artifacts/
          if-no-files-found: error
